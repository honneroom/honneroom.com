<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#2a1f1a;--cream:#faf6f0;--warm:#f0e8dc;--terracotta:#c4622d;--terracotta-pale:#f5e0d4;--mist:#9a8c84;--border:rgba(42,31,26,0.1)}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;background:rgba(250,246,240,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600}
.nav-logo img{width:28px;height:28px;object-fit:contain}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{text-decoration:none;color:var(--mist);font-size:13px;letter-spacing:0.04em;transition:color 0.2s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{background:var(--terracotta);color:#fff !important;padding:8px 20px;border-radius:4px;font-size:13px !important;letter-spacing:0.04em;transition:opacity 0.2s !important}
.nav-cta:hover{opacity:0.85}
.hero{padding:80px 40px 64px;max-width:900px;margin:0 auto;border-bottom:1px solid var(--border)}
.hero-label{font-size:11px;letter-spacing:0.12em;color:var(--terracotta);text-transform:uppercase;margin-bottom:20px;font-weight:400}
.hero h1{font-family:'Shippori Mincho',serif;font-size:clamp(28px,4vw,44px);font-weight:700;line-height:1.3;color:var(--ink);margin-bottom:20px}
.hero h1 em{font-style:normal;color:var(--terracotta)}
.hero-desc{font-size:15px;color:var(--mist);max-width:520px;line-height:1.8}
.filter-bar{padding:32px 40px;max-width:900px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap}
.filter-btn{padding:7px 18px;border:1px solid var(--border);background:transparent;border-radius:100px;font-size:13px;color:var(--mist);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;letter-spacing:0.02em}
.filter-btn:hover,.filter-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.articles{max-width:900px;margin:0 auto;padding:0 40px 80px}
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px;background:var(--border);border:1px solid var(--border)}
.article-card{background:var(--cream);padding:36px 32px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;transition:background 0.2s;position:relative;overflow:hidden}
.article-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--terracotta);transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease}
.article-card:hover{background:var(--warm)}
.article-card:hover::after{transform:scaleX(1)}
.article-tag{font-size:10px;letter-spacing:0.1em;color:var(--terracotta);text-transform:uppercase;font-weight:400}
.article-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;line-height:1.55;color:var(--ink)}
.article-meta{font-size:12px;color:var(--mist);margin-top:auto;display:flex;align-items:center;gap:8px}
.article-meta::before{content:'';display:block;width:16px;height:1px;background:var(--mist)}
.grid-empty{padding:48px 32px;color:var(--mist);font-size:14px;background:var(--cream)}
.cta-banner{background:var(--ink);color:var(--cream);padding:64px 40px;text-align:center;margin-top:64px}
.cta-banner p{font-family:'Shippori Mincho',serif;font-size:clamp(18px,2.5vw,26px);margin-bottom:8px;line-height:1.5}
.cta-banner small{font-size:14px;color:rgba(250,246,240,0.5);display:block;margin-bottom:32px}
.cta-btn{display:inline-block;background:var(--terracotta);color:#fff;text-decoration:none;padding:14px 36px;font-size:14px;letter-spacing:0.06em;border-radius:4px;transition:opacity 0.2s}
.cta-btn:hover{opacity:0.85}
footer{background:var(--ink);color:rgba(250,246,240,0.4);padding:48px 40px;text-align:center;border-top:1px solid rgba(250,246,240,0.06)}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:16px;color:var(--cream);display:inline-flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:24px}
.footer-links{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:24px}
.footer-links a{color:rgba(250,246,240,0.35);text-decoration:none;font-size:12px;letter-spacing:0.04em;transition:color 0.2s}
.footer-links a:hover{color:var(--cream)}
.footer-copy{font-size:11px;letter-spacing:0.04em}
@media(max-width:640px){nav{padding:0 20px}.hero,.filter-bar,.articles{padding-left:20px;padding-right:20px}.hero{padding-top:56px;padding-bottom:48px}.articles-grid{grid-template-columns:1fr}.nav-links{display:none}footer{padding:40px 20px}.footer-links{gap:20px}.cta-banner{padding:48px 20px}}
.fade-in{opacity:0;transform:translateY(16px);transition:opacity 0.5s ease,transform 0.5s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="https://honneroom.com/assets/icon.png" alt="本音ルーム">
    本音ルーム
  </a>
  <div class="nav-links">
    <a href="/">トップ</a>
    <a href="/column/" style="color:var(--ink)">コラム</a>
    <a href="https://app.honneroom.com" class="nav-cta">無料で始める</a>
  </div>
</nav>

<div class="hero fade-in">
  <div class="hero-label">Column</div>
  <h1>女性の<em>本音</em>に向き合うメディア</h1>
  <p class="hero-desc">仕事、婚活、お金、将来…正解のない問いを一人で抱えていませんか。似た境遇の女性たちの声をもとに、リアルな視点で書いています。</p>
</div>

<div class="filter-bar fade-in" id="filterBar">
  <button class="filter-btn active" data-cat="all">すべて</button>
  <!-- カテゴリボタンはJSで動的生成 -->
</div>

<div class="articles">

  <a href="https://app.honneroom.com" class="cta-btn">無料で参加する →</a>

<footer>
  <a href="/" class="footer-logo">

    本音ルーム
  </a>

    <a href="/terms.html">利用規約</a>
    <a href="/privacy.html">プライバシーポリシー</a>
    <a href="/legal.html">特定商取引法に基づく表記</a>
    <a href="/contact.html">お問い合わせ</a>
  </div>
  <p class="footer-copy">© 2026 本音ルーム. All rights reserved.</p>
</footer>

<script>
// ============================================================
// 【記事の追加方法】
// articles.json に以下の形式で追記するだけでOKです。
// index.html の編集は一切不要です。
//
// {
//   "id": "article-16",        ← HTMLファイル名（.htmlを除く）
//   "title": "記事タイトル",
//   "category": "カテゴリ名",  ← 既存カテゴリ or 新カテゴリ（自動でボタン追加）
//   "date": "2026.04"
// }
// ============================================================

let allArticles = [];

fetch('/column/articles.json')
  .then(res => res.json())
  .then(data => {
    allArticles = data;
    buildCategories(data);
    renderCards(data);
    initFadeIn();
  })
  .catch(err => console.error('articles.json の読み込みに失敗:', err));

// カテゴリボタンを動的生成（重複なし・記事の登場順）
function buildCategories(articles) {
  const cats = [...new Set(articles.map(a => a.category))];
  const bar = document.getElementById('filterBar');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    bar.appendChild(btn);
  });

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    renderCards(cat === 'all' ? allArticles : allArticles.filter(a => a.category === cat));
  });
}

// 記事カードをグリッドに描画
function renderCards(articles) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (articles.length === 0) {
    grid.innerHTML = '<p class="grid-empty">該当する記事はありません。</p>';
    return;
  }
  articles.forEach(article => {
    const a = document.createElement('a');
    a.href = `/column/${article.id}.html`;
    a.className = 'article-card fade-in';
    a.dataset.cat = article.category;
    a.innerHTML = `
      <span class="article-tag">${article.category}</span>
      <p class="article-title">${article.title}</p>
      <span class="article-meta">${article.date}</span>
    `;
    grid.appendChild(a);
  });
  requestAnimationFrame(initFadeIn);
}

// Intersection Observer でfade-in
function initFadeIn() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 60);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.fade-in:not(.visible)').forEach(el => obs.observe(el));
}
</script>
</body>
