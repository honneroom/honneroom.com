<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜本音ルーム</title>
<link rel="icon" type="image/png" href="https://honneroom.com/assets/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #2a1f1a;
    --cream: #faf6f0;
    --warm: #f2ebe0;
    --terra: #b85c38;
    --terra-light: #d4795a;
    --mist: #9a8880;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.8;
  }
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(250,246,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(42,31,26,0.08);
  }
  .nav-logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .nav-back {
    font-size: 13px;
    color: var(--mist);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--terra); }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 48px 120px;
  }
  .page-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .page-label::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--terra);
    opacity: 0.5;
  }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .lead {
    font-size: 15px;
    line-height: 1.9;
    color: #6a5550;
    font-weight: 300;
    margin-bottom: 56px;
    padding-bottom: 56px;
    border-bottom: 1px solid rgba(42,31,26,0.08);
  }
  .note {
    font-size: 13px;
    color: var(--mist);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .form-wrapper {
    background: white;
    border: 1px solid rgba(42,31,26,0.08);
    overflow: hidden;
    border-radius: 4px;
  }
  .form-wrapper iframe {
    width: 100%;
    min-height: 900px;
    border: none;
    display: block;
  }
  footer {
    background: var(--ink);
    color: rgba(250,246,240,0.5);
    padding: 48px;
    text-align: center;
  }
  .footer-logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: var(--cream);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    margin-bottom: 24px;
  }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .footer-links a {
    color: rgba(250,246,240,0.4);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--cream); }
  .footer-copy { font-size: 11px; letter-spacing: 0.04em; }
  @media (max-width: 700px) {
    nav { padding: 16px 20px; }
    .container { padding: 48px 20px 80px; }
    .form-wrapper iframe { min-height: 1000px; }
    footer { padding: 40px 20px; }
    .footer-links { gap: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="https://honneroom.com/assets/icon.png" alt="本音ルーム" style="width:28px;height:28px;object-fit:contain;">
    本音ルーム
  </a>
  <a href="/" class="nav-back">← トップへ戻る</a>
</nav>

<div class="container">
  <div class="page-label">Contact</div>
  <h1>お問い合わせ</h1>
  <p class="lead">サービスに関するご質問・ご要望・不具合のご報告などは、以下フォームよりお送りください。通常2〜3営業日以内にご返信いたします。</p>

  <p class="note">※ ご返信はご入力いただいたメールアドレス宛にお送りします。<br>※ 迷惑メールフォルダに振り分けられる場合がありますのでご確認ください。</p>

  <div class="form-wrapper">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSer3OAsfhEULs4Lirnvsnp_BuRU6BHmtTanKcITDcQrJT3YNg/viewform?embedded=true"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="お問い合わせフォーム">
      読み込んでいます…
    </iframe>
  </div>
</div>

<footer>
  <a href="/" class="footer-logo">
    <img src="https://honneroom.com/assets/icon.png" alt="本音ルーム" style="width:22px;height:22px;object-fit:contain;">
    本音ルーム
  </a>
  <div class="footer-links">
    <a href="/terms.html">利用規約</a>
    <a href="/privacy.html">プライバシーポリシー</a>
    <a href="/legal.html">特定商取引法に基づく表記</a>
    <a href="/contact.html">お問い合わせ</a>
  </div>
  <p class="footer-copy">© 2026 本音ルーム. All rights reserved.</p>
</footer>

</body>
</html>
